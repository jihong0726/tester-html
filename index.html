<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKX 农场大亨 V3.0 📈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        body { 
            background-color: #131722; 
            color: #ecf0f1; 
            font-family: 'ZCOOL KuaiLe', -apple-system, sans-serif;
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* 顶部 K 线区域 */
        .chart-container { height: 45vh; border-bottom: 4px solid #2b3139; background: #131722; position: relative; }
        
        /* 游戏区域 */
        .game-area { flex: 1; display: flex; padding: 16px; gap: 16px; background: #1e222d; position: relative; }
        
        .zone { flex: 1; border-radius: 12px; padding: 12px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; position: relative; }
        .farm-zone { background: linear-gradient(180deg, #3a506b 0%, #27ae60 100%); border: 4px solid #2ecc71; box-shadow: inset 0 0 20px rgba(0,0,0,0.3); }
        .pond-zone { background: linear-gradient(180deg, #3a506b 0%, #2980b9 100%); border: 4px solid #3498db; box-shadow: inset 0 0 20px rgba(0,0,0,0.3); }

        /* 坑位样式 */
        .slot { 
            border-radius: 12px; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            box-shadow: 0 8px 0 rgba(0,0,0,0.2); transition: 0.2s; cursor: pointer;
        }
        .slot:active { transform: translateY(4px); box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
        
        .slot-dirt { background: #8B4513; border: 4px solid #5C4033; }
        .slot-water { background: #3498db; border: 4px solid #2980b9; }
        
        .slot-locked { background: #2c3e50 !important; border-color: #1a252f !important; filter: grayscale(0.8); cursor: pointer; }
        .slot-locked:hover { filter: brightness(1.2); }
        
        .entity-emoji { font-size: 50px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.4)); z-index: 10; transition: 0.3s;}
        
        /* 状态 UI */
        .status-bar { position: absolute; top: -10px; width: 90%; background: rgba(0,0,0,0.8); border-radius: 6px; padding: 4px; border: 1px solid #555; z-index: 20; text-align: center; }
        .progress-bg { width: 100%; height: 6px; background: #333; border-radius: 3px; overflow: hidden; margin-top: 4px; }
        .progress-fill { height: 100%; background: #f1c40f; width: 0%; }

        /* 顶部信息栏 */
        .header-bar { position: absolute; top: 12px; left: 16px; right: 16px; display: flex; justify-content: space-between; z-index: 50; pointer-events: none; }
        .hud-box { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 8px; pointer-events: auto; }

        /* 种植弹窗 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(2px); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #2b3139; border: 2px solid #f1c40f; border-radius: 16px; padding: 24px; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .game-input { background: #131722; border: 1px solid #555; color: #fff; border-radius: 8px; padding: 10px; width: 100%; font-family: sans-serif; font-weight: bold; margin-bottom: 16px; outline: none;}
        .game-input:focus { border-color: #f1c40f; }

        /* 动画特效 */
        @keyframes floatText { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-60px) scale(1.5); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .anim-reward { animation: floatText 1.5s ease-out forwards; position: absolute; font-size: 24px; font-weight: bold; z-index: 50; text-shadow: 0 2px 4px #000; pointer-events: none; }
        .anim-fail { animation: shake 0.5s ease-in-out; filter: grayscale(1); }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="hud-box flex items-center gap-4">
            <select id="instSelect" class="bg-transparent text-xl font-bold text-[#f1c40f] outline-none cursor-pointer" onchange="changeSymbol()">
                <option value="OKX:BTCUSDT.P">BTC-USDT 永续</option>
                <option value="OKX:ETHUSDT.P">ETH-USDT 永续</option>
            </select>
            <div class="text-sm border-l border-gray-600 pl-4">
                当前价格: <span id="realtimePrice" class="font-mono font-bold text-white text-lg">Loading...</span>
            </div>
        </div>
        <div class="hud-box flex flex-col items-end">
            <span class="text-xs text-gray-400">金库余额</span>
            <span class="text-2xl font-bold text-[#f1c40f] font-mono" id="balanceDisplay">1,000.00 USDT</span>
        </div>
    </div>

    <div class="chart-container" id="tv_chart_container">
        </div>

    <div class="game-area">
        <div class="zone farm-zone" id="farmZone">
            <div class="absolute -top-4 left-4 bg-[#2ecc71] text-white px-3 py-1 rounded-full font-bold shadow-lg border-2 border-white text-sm">🌾 农场 (买涨)</div>
            </div>

        <div class="zone pond-zone" id="pondZone">
            <div class="absolute -top-4 right-4 bg-[#3498db] text-white px-3 py-1 rounded-full font-bold shadow-lg border-2 border-white text-sm">🐟 池塘 (买跌)</div>
            </div>
    </div>

    <div class="modal-overlay" id="actionModal">
        <div class="modal-content">
            <h2 class="text-xl font-bold mb-4 text-white" id="modalTitle">播种 (买涨)</h2>
            <div class="text-xs text-gray-400 mb-2 text-left">投入资金 (USDT)</div>
            <input type="number" id="modalAmount" class="game-input" value="100">
            
            <div class="text-xs text-gray-400 mb-2 text-left">成熟周期</div>
            <select id="modalTime" class="game-input cursor-pointer">
                <option value="10">10 秒 (测试)</option>
                <option value="60">1 分钟</option>
                <option value="180">3 分钟</option>
                <option value="300">5 分钟</option>
            </select>

            <div class="text-sm text-[#f1c40f] mb-6 font-sans">
                赔率: 猜中返回 <span class="font-bold">1.8倍</span>，猜错全亏
            </div>

            <div class="flex gap-4">
                <button class="flex-1 py-3 bg-gray-600 hover:bg-gray-500 rounded-lg text-white transition-colors" onclick="closeModal()">取消</button>
                <button class="flex-1 py-3 bg-[#0ecb81] hover:bg-[#0b9e65] rounded-lg text-white font-bold transition-colors" id="modalConfirmBtn" onclick="confirmAction()">确定种下</button>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // --- 1. K 线图表初始化 ---
        let tvWidget;
        function initChart(symbol) {
            if(tvWidget) {
                document.getElementById('tv_chart_container').innerHTML = '';
            }
            tvWidget = new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "1", // 1分钟线
                "timezone": "Asia/Shanghai",
                "theme": "dark",
                "style": "1",
                "locale": "zh_CN",
                "enable_publishing": false,
                "hide_top_toolbar": true,
                "hide_legend": true,
                "save_image": false,
                "container_id": "tv_chart_container",
                "backgroundColor": "#131722",
                "gridColor": "#1f2938"
            });
        }
        initChart("OKX:BTCUSDT.P");

        function changeSymbol() {
            const sym = document.getElementById('instSelect').value;
            initChart(sym);
            // 同时切换 websocket
            instId = sym === "OKX:BTCUSDT.P" ? "BTC-USDT-SWAP" : "ETH-USDT-SWAP";
            currentPrice = 0; document.getElementById('realtimePrice').innerText = 'Loading...';
            connectWS();
        }

        // --- 2. 真实行情 WebSocket ---
        let instId = "BTC-USDT-SWAP";
        let currentPrice = 0;
        let ws = null;

        function connectWS() {
            if(ws) ws.close();
            ws = new WebSocket('wss://ws.okx.com:8443/ws/v5/public');
            ws.onopen = () => { ws.send(JSON.stringify({ op: "subscribe", args: [{ channel: "tickers", instId: instId }] })); };
            ws.onmessage = (event) => {
                if(event.data === 'pong') return;
                const res = JSON.parse(event.data);
                if (res.data && res.data[0]) {
                    const newPrice = parseFloat(res.data[0].last);
                    const priceEl = document.getElementById('realtimePrice');
                    priceEl.innerText = newPrice.toFixed(2);
                    priceEl.style.color = newPrice >= currentPrice ? '#0ecb81' : '#f6465d';
                    currentPrice = newPrice;
                }
            };
        }
        connectWS();
        setInterval(() => { if (ws && ws.readyState === WebSocket.OPEN) ws.send('ping'); }, 20000);

        // --- 3. 游戏与资产系统 ---
        let balance = 1000.00;
        const PAYOUT_RATE = 1.8;
        
        // 坑位配置 (解锁价格随编号递增)
        let plots = {
            farm: [
                { id: 'f0', unlocked: true, unlockPrice: 0, status: 'empty', entity: null },
                { id: 'f1', unlocked: false, unlockPrice: 500, status: 'empty', entity: null },
                { id: 'f2', unlocked: false, unlockPrice: 1500, status: 'empty', entity: null },
                { id: 'f3', unlocked: false, unlockPrice: 5000, status: 'empty', entity: null }
            ],
            pond: [
                { id: 'p0', unlocked: true, unlockPrice: 0, status: 'empty', entity: null },
                { id: 'p1', unlocked: false, unlockPrice: 500, status: 'empty', entity: null },
                { id: 'p2', unlocked: false, unlockPrice: 1500, status: 'empty', entity: null },
                { id: 'p3', unlocked: false, unlockPrice: 5000, status: 'empty', entity: null }
            ]
        };

        function updateBalance() {
            document.getElementById('balanceDisplay').innerText = balance.toLocaleString(undefined, {minimumFractionDigits:2}) + " USDT";
        }

        // 渲染地块
        function renderPlots() {
            const farmZone = document.getElementById('farmZone');
            const pondZone = document.getElementById('pondZone');
            farmZone.innerHTML = '<div class="absolute -top-4 left-4 bg-[#2ecc71] text-white px-3 py-1 rounded-full font-bold shadow-lg border-2 border-white text-sm">🌾 农场 (买涨)</div>';
            pondZone.innerHTML = '<div class="absolute -top-4 right-4 bg-[#3498db] text-white px-3 py-1 rounded-full font-bold shadow-lg border-2 border-white text-sm">🐟 池塘 (买跌)</div>';

            plots.farm.forEach((p, idx) => farmZone.appendChild(createPlotDOM(p, 'farm', idx)));
            plots.pond.forEach((p, idx) => pondZone.appendChild(createPlotDOM(p, 'pond', idx)));
        }

        function createPlotDOM(plot, type, index) {
            const div = document.createElement('div');
            
            if (!plot.unlocked) {
                div.className = `slot slot-locked`;
                div.innerHTML = `
                    <div class="text-4xl mb-2">🔒</div>
                    <div class="text-[#f1c40f] font-bold text-sm bg-black/50 px-2 py-1 rounded">解锁: ${plot.unlockPrice} U</div>
                `;
                div.onclick = () => unlockPlot(type, index);
                return div;
            }

            div.className = `slot ${type === 'farm' ? 'slot-dirt' : 'slot-water'}`;
            div.id = plot.id;
            
            if (plot.status === 'empty') {
                div.innerHTML = `<div class="entity-emoji opacity-20">${type === 'farm' ? '🌱' : '🥚'}</div>`;
                div.onclick = () => openActionModal(type, index);
            } else {
                // 生长中
                const ent = plot.entity;
                div.innerHTML = `
                    <div class="status-bar">
                        <div class="text-[10px] text-gray-300 font-mono">入场价 ${ent.entryPrice.toFixed(1)}</div>
                        <div class="progress-bg"><div class="progress-fill" id="prog_${plot.id}"></div></div>
                    </div>
                    <div class="entity-emoji" id="emoji_${plot.id}">${type === 'farm' ? '🌿' : '🐡'}</div>
                `;
            }
            return div;
        }

        // --- 解锁与种植交互 ---
        function unlockPlot(type, index) {
            const plot = plots[type][index];
            if (balance >= plot.unlockPrice) {
                if(confirm(`花费 ${plot.unlockPrice} USDT 解锁这块区域吗？`)) {
                    balance -= plot.unlockPrice;
                    plot.unlocked = true;
                    updateBalance();
                    renderPlots();
                }
            } else {
                alert("余额不足，无法解锁！先去赚点钱吧！");
            }
        }

        let currentActionTarget = null;
        function openActionModal(type, index) {
            if(currentPrice <= 0) return alert("等待行情连接...");
            currentActionTarget = { type, index };
            const isFarm = type === 'farm';
            
            document.getElementById('modalTitle').innerText = isFarm ? '🌱 播种 (猜涨)' : '🥚 投卵 (猜跌)';
            const btn = document.getElementById('modalConfirmBtn');
            btn.innerText = isFarm ? '确定播种' : '确定投卵';
            btn.style.backgroundColor = isFarm ? '#27ae60' : '#2980b9';
            
            document.getElementById('actionModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('actionModal').style.display = 'none'; }

        function confirmAction() {
            const amount = parseFloat(document.getElementById('modalAmount').value);
            if(isNaN(amount) || amount <= 0 || amount > balance) return alert("金额输入有误或余额不足！");
            
            const dur = parseInt(document.getElementById('modalTime').value);
            balance -= amount;
            updateBalance();

            const { type, index } = currentActionTarget;
            const plot = plots[type][index];
            
            plot.status = 'growing';
            plot.entity = {
                amount: amount,
                entryPrice: currentPrice,
                durationMs: dur * 1000,
                startTime: Date.now(),
                resolved: false
            };

            closeModal();
            renderPlots();
        }

        // --- 游戏主循环 (结算引擎) ---
        function gameLoop() {
            const now = Date.now();
            
            ['farm', 'pond'].forEach(type => {
                plots[type].forEach((plot, idx) => {
                    if(plot.status === 'growing' && plot.entity && !plot.entity.resolved) {
                        const ent = plot.entity;
                        const elapsed = now - ent.startTime;
                        const progress = Math.min((elapsed / ent.durationMs) * 100, 100);
                        
                        // 更新进度条
                        const progEl = document.getElementById(`prog_${plot.id}`);
                        if(progEl) progEl.style.width = progress + '%';

                        // 动画演变
                        const emojiEl = document.getElementById(`emoji_${plot.id}`);
                        if(emojiEl) {
                            if(progress > 70) emojiEl.innerText = type === 'farm' ? '🌳' : '🦈';
                        }

                        // 到期结算
                        if (progress >= 100) {
                            ent.resolved = true;
                            
                            let isWin = false;
                            if (type === 'farm') isWin = currentPrice > ent.entryPrice; // 买涨
                            else isWin = currentPrice < ent.entryPrice; // 买跌

                            const domEl = document.getElementById(plot.id);
                            
                            if(isWin) {
                                // 胜利
                                emojiEl.innerText = type === 'farm' ? '🍎' : '💰';
                                emojiEl.style.transform = 'scale(1.3)';
                                
                                const winAmount = ent.amount * PAYOUT_RATE;
                                balance += winAmount;
                                updateBalance();

                                const reward = document.createElement('div');
                                reward.className = 'anim-reward text-[#f1c40f]';
                                reward.innerText = '+' + winAmount.toFixed(2);
                                domEl.appendChild(reward);
                            } else {
                                // 失败
                                emojiEl.innerText = type === 'farm' ? '🥀' : '☠️';
                                emojiEl.classList.add('anim-fail');
                            }

                            // 2.5秒后清理地块
                            setTimeout(() => {
                                plot.status = 'empty';
                                plot.entity = null;
                                renderPlots();
                            }, 2500);
                        }
                    }
                });
            });

            requestAnimationFrame(gameLoop);
        }

        renderPlots();
        requestAnimationFrame(gameLoop);

    </script>
</body>
</html>
