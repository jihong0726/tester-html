<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKX 杠杆农场 🚜 | 真实行情模拟经营</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 游戏专属圆润/像素感字体 */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=ZCOOL+KuaiLe&display=swap');

        body { 
            background-color: #1e272e; 
            color: #ecf0f1; 
            font-family: 'Fredoka', 'ZCOOL KuaiLe', sans-serif;
            margin: 0; overflow: hidden; user-select: none;
        }

        /* 木质 UI 材质 */
        .wood-panel {
            background: linear-gradient(180deg, #8e44ad 0%, #2c3e50 100%);
            border: 4px solid #34495e;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 4px 6px rgba(0,0,0,0.3);
            border-radius: 12px;
        }
        .wood-header {
            background: linear-gradient(to bottom, #d35400, #8e44ad);
            border-bottom: 3px solid #2c3e50;
            color: #f1c40f; text-shadow: 1px 1px 0 #000;
        }

        /* 游戏主场景 */
        .game-board { display: flex; height: calc(100vh - 160px); padding: 16px; gap: 16px; padding-top: 80px; }
        
        .zone-container { flex: 1; border-radius: 16px; padding: 16px; display: flex; flex-direction: column; position: relative; }
        .farm-zone { background: linear-gradient(180deg, #87CEEB 0%, #27ae60 100%); border: 6px solid #2ecc71; box-shadow: inset 0 0 40px rgba(0,0,0,0.2); }
        .pond-zone { background: linear-gradient(180deg, #87CEEB 0%, #2980b9 100%); border: 6px solid #3498db; box-shadow: inset 0 0 40px rgba(0,0,0,0.2); }

        /* 坑位系统 (Grid) */
        .slot-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; flex: 1; }
        
        .dirt-patch {
            background: radial-gradient(ellipse at center, #8B4513 0%, #5C4033 100%);
            border-radius: 20px; border: 4px solid #3e2723;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            position: relative; box-shadow: 0 10px 0 rgba(0,0,0,0.2); transition: 0.2s;
        }
        .water-tank {
            background: radial-gradient(ellipse at center, #3498db 0%, #2980b9 100%);
            border-radius: 20px; border: 4px solid #2c3e50;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            position: relative; box-shadow: inset 0 0 20px rgba(255,255,255,0.2), 0 10px 0 rgba(0,0,0,0.2); transition: 0.2s;
        }
        .slot-empty { opacity: 0.5; filter: grayscale(0.5); }

        /* 实体状态与 UI */
        .entity-emoji { font-size: 56px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.4)); margin-bottom: 10px; transition: transform 0.2s; z-index: 10;}
        .entity-panel { position: absolute; top: 10px; width: 90%; background: rgba(0,0,0,0.7); border-radius: 8px; padding: 6px; border: 2px solid #555; z-index: 20;}
        
        .pnl-text { font-family: monospace; font-size: 14px; font-weight: bold; text-align: center; margin-bottom: 4px; }
        .pnl-green { color: #2ecc71; text-shadow: 0 0 5px rgba(46,204,113,0.5); }
        .pnl-red { color: #e74c3c; text-shadow: 0 0 5px rgba(231,76,60,0.5); }

        /* 游戏化血条 (时间进度) */
        .hp-bar-bg { width: 100%; height: 8px; background: #222; border-radius: 4px; border: 1px solid #000; overflow: hidden; }
        .hp-bar-fill { height: 100%; background: linear-gradient(90deg, #f1c40f, #f39c12); width: 0%; }

        /* 动画 */
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-80px) scale(1.5); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px) rotate(-5deg); } 75% { transform: translateX(5px) rotate(5deg); } }
        .anim-harvest { animation: floatUp 1.5s ease-out forwards; position: absolute; font-size: 28px; font-weight: bold; z-index: 50; text-shadow: 0 2px 4px #000; }
        .anim-rekt { animation: shake 0.5s ease-in-out; filter: grayscale(1) brightness(0.5); }

        /* 控制台输入 */
        .game-input { background: rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.1); color: #f1c40f; border-radius: 8px; padding: 8px; font-size: 18px; outline: none; font-family: monospace; font-weight: bold; text-align: center; transition: 0.2s;}
        .game-input:focus { border-color: #f1c40f; background: rgba(0,0,0,0.5); }
        
        .btn-action { border: none; border-radius: 12px; font-size: 22px; font-weight: bold; padding: 12px 0; cursor: pointer; transition: 0.1s; box-shadow: 0 6px 0 rgba(0,0,0,0.3); display: flex; flex-direction: column; align-items: center; color: white; }
        .btn-action:active { transform: translateY(6px); box-shadow: 0 0 0 rgba(0,0,0,0); }
        .btn-long { background: linear-gradient(180deg, #2ecc71, #27ae60); border: 2px solid #2ecc71; }
        .btn-short { background: linear-gradient(180deg, #3498db, #2980b9); border: 2px solid #3498db; }

        /* 杠杆滑块定制 */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #f1c40f; border: 4px solid #fff; cursor: pointer; margin-top: -8px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; background: rgba(0,0,0,0.5); border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="fixed top-4 left-0 w-full px-6 flex justify-between items-center z-50 pointer-events-none">
        
        <div class="wood-panel wood-header px-6 py-3 flex flex-col items-center pointer-events-auto">
            <span class="text-[12px] text-[#f39c12] uppercase tracking-wider mb-1">🏦 我的金库</span>
            <span class="text-3xl font-mono font-bold" id="balanceDisplay">10,000.00</span>
        </div>

        <div class="wood-panel px-6 py-2 flex items-center gap-6 pointer-events-auto bg-black/80">
            <select id="instId" class="bg-transparent text-2xl font-bold text-white outline-none cursor-pointer" onchange="switchPair()">
                <option value="BTC-USDT-SWAP">BTC 永续</option>
                <option value="ETH-USDT-SWAP">ETH 永续</option>
            </select>
            <div class="flex flex-col items-end border-l border-white/20 pl-6">
                <span class="text-[10px] text-gray-400">实时行情源 (OKX)</span>
                <span class="text-3xl font-mono font-bold text-[#2ecc71]" id="tickerPrice">Loading...</span>
            </div>
        </div>
    </div>

    <div class="game-board">
        <div class="zone-container farm-zone">
            <div class="absolute top-2 left-4 text-white/80 text-xl font-bold tracking-widest drop-shadow-md">↑ 杠杆农场 (买涨)</div>
            <div class="slot-grid mt-8" id="farmGrid">
                </div>
        </div>
        
        <div class="zone-container pond-zone">
            <div class="absolute top-2 right-4 text-white/80 text-xl font-bold tracking-widest drop-shadow-md">↓ 空头水族馆 (买跌)</div>
            <div class="slot-grid mt-8" id="pondGrid">
                </div>
        </div>
    </div>

    <div class="h-[160px] wood-panel mx-4 mb-4 mt-2 flex items-center px-6 gap-6 relative z-50">
        
        <div class="flex-1 grid grid-cols-3 gap-6">
            <div class="flex flex-col">
                <label class="text-sm text-gray-300 mb-2 font-bold">投入本金 (USDT)</label>
                <input type="number" id="investAmount" class="game-input" value="100">
            </div>
            
            <div class="flex flex-col">
                <div class="flex justify-between text-sm text-gray-300 mb-2 font-bold">
                    <label>风险倍数 (杠杆)</label>
                    <span id="levDisplay" class="text-[#f1c40f]">10x</span>
                </div>
                <input type="range" id="leverageSlider" min="1" max="125" value="10" oninput="updateLev()">
                <div class="text-[10px] text-gray-400 mt-1 text-center">倍数越高，收益越暴躁，越容易爆仓枯萎</div>
            </div>

            <div class="flex flex-col">
                <label class="text-sm text-gray-300 mb-2 font-bold">成熟周期</label>
                <select id="timeDuration" class="game-input cursor-pointer">
                    <option value="10">10 秒 (闪电战)</option>
                    <option value="30">30 秒</option>
                    <option value="60">1 分钟</option>
                    <option value="180">3 分钟</option>
                    <option value="300">5 分钟</option>
                </select>
            </div>
        </div>

        <div class="flex gap-4 w-[300px]">
            <button class="flex-1 btn-action btn-long" onclick="openPosition('long')">
                <span class="text-3xl mb-1">🌱</span>
                <span class="text-lg">播种 (做多)</span>
            </button>
            <button class="flex-1 btn-action btn-short" onclick="openPosition('short')">
                <span class="text-3xl mb-1">🥚</span>
                <span class="text-lg">投卵 (做空)</span>
            </button>
        </div>
    </div>

    <script>
        // --- 游戏状态 ---
        let balance = 10000.00;
        let currentPrice = 0;
        let instId = "BTC-USDT-SWAP";
        
        // 坑位数据 (0-3 是农场，4-7 是鱼缸)
        const MAX_SLOTS_PER_ZONE = 4;
        let slots = {
            long: [null, null, null, null],
            short: [null, null, null, null]
        };

        // --- 初始化 UI ---
        function initGrids() {
            const farm = document.getElementById('farmGrid');
            const pond = document.getElementById('pondGrid');
            farm.innerHTML = ''; pond.innerHTML = '';

            for(let i=0; i<MAX_SLOTS_PER_ZONE; i++) {
                farm.innerHTML += `<div class="dirt-patch slot-empty" id="slot_long_${i}"><div class="entity-emoji text-gray-500 opacity-30">🌱</div></div>`;
                pond.innerHTML += `<div class="water-tank slot-empty" id="slot_short_${i}"><div class="entity-emoji text-gray-500 opacity-30">🥚</div></div>`;
            }
        }
        initGrids();

        function updateBalanceUI() {
            document.getElementById('balanceDisplay').innerText = balance.toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function updateLev() {
            document.getElementById('levDisplay').innerText = document.getElementById('leverageSlider').value + 'x';
        }

        // --- WebSocket 真实行情 ---
        let ws = null;
        function connectWS() {
            if(ws) ws.close();
            ws = new WebSocket('wss://ws.okx.com:8443/ws/v5/public');
            ws.onopen = () => { ws.send(JSON.stringify({ op: "subscribe", args: [{ channel: "tickers", instId: instId }] })); };
            ws.onmessage = (event) => {
                if(event.data === 'pong') return;
                const res = JSON.parse(event.data);
                if (res.data && res.data[0]) {
                    const newPrice = parseFloat(res.data[0].last);
                    const priceEl = document.getElementById('tickerPrice');
                    priceEl.innerText = newPrice.toFixed(2);
                    priceEl.style.color = newPrice >= currentPrice ? '#2ecc71' : '#e74c3c';
                    currentPrice = newPrice;
                }
            };
        }
        connectWS();
        setInterval(() => { if (ws && ws.readyState === WebSocket.OPEN) ws.send('ping'); }, 20000);

        function switchPair() {
            instId = document.getElementById('instId').value;
            currentPrice = 0; document.getElementById('tickerPrice').innerText = 'Loading...';
            connectWS();
        }

        // --- 开仓逻辑 (播种/投卵) ---
        function openPosition(side) {
            if(currentPrice <= 0) return alert("📡 正在连接 OKX 卫星，请稍后...");
            
            const amount = parseFloat(document.getElementById('investAmount').value);
            if(isNaN(amount) || amount <= 0 || amount > balance) return alert("❌ 本金不足或输入错误！");
            
            // 寻找空坑位
            const emptyIdx = slots[side].findIndex(s => s === null);
            if(emptyIdx === -1) return alert("⚠️ 坑位已满！请等待作物成熟或爆仓。");

            const lev = parseInt(document.getElementById('leverageSlider').value);
            const durationSec = parseInt(document.getElementById('timeDuration').value);
            
            // 扣钱
            balance -= amount;
            updateBalanceUI();

            // 注册实体
            const entity = {
                id: `ent_${Date.now()}_${Math.random()}`,
                side: side,
                index: emptyIdx,
                amount: amount,
                leverage: lev,
                entryPrice: currentPrice,
                startTime: Date.now(),
                durationMs: durationSec * 1000,
                status: 'alive' // alive, rekt, harvested
            };
            
            slots[side][emptyIdx] = entity;
            renderSlot(entity);
        }

        // --- 渲染坑位 DOM ---
        function renderSlot(ent) {
            const el = document.getElementById(`slot_${ent.side}_${ent.index}`);
            el.classList.remove('slot-empty');
            
            el.innerHTML = `
                <div class="entity-panel">
                    <div class="flex justify-between text-[10px] text-gray-400 mb-1">
                        <span>开: ${ent.entryPrice.toFixed(1)}</span>
                        <span class="text-[#f1c40f]">${ent.leverage}x</span>
                    </div>
                    <div class="pnl-text" id="pnl_${ent.id}">0.00 USDT</div>
                    <div class="hp-bar-bg"><div class="hp-bar-fill" id="hp_${ent.id}"></div></div>
                </div>
                <div class="entity-emoji" id="emoji_${ent.id}">${ent.side === 'long' ? '🌱' : '🥚'}</div>
            `;
        }

        function clearSlot(side, index) {
            slots[side][index] = null;
            const el = document.getElementById(`slot_${side}_${index}`);
            el.className = side === 'long' ? 'dirt-patch slot-empty' : 'water-tank slot-empty';
            el.innerHTML = `<div class="entity-emoji text-gray-500 opacity-30">${side === 'long' ? '🌱' : '🥚'}</div>`;
        }

        // --- 游戏主循环 (核心引擎) ---
        function gameLoop() {
            const now = Date.now();
            
            ['long', 'short'].forEach(side => {
                slots[side].forEach((ent, idx) => {
                    if(!ent || ent.status !== 'alive') return;

                    const elapsed = now - ent.startTime;
                    let progress = Math.min((elapsed / ent.durationMs) * 100, 100);
                    
                    // 1. 核心盈亏计算 (OKX 杠杆公式简化版)
                    // ROE = (标记价 - 开仓价) / 开仓价 * 杠杆倍数 * 仓位方向
                    const priceDiff = currentPrice - ent.entryPrice;
                    const roe = (priceDiff / ent.entryPrice) * ent.leverage * (side === 'long' ? 1 : -1);
                    const pnl = ent.amount * roe;
                    const equity = ent.amount + pnl;

                    // 2. UI 更新
                    const pnlEl = document.getElementById(`pnl_${ent.id}`);
                    const hpEl = document.getElementById(`hp_${ent.id}`);
                    const emojiEl = document.getElementById(`emoji_${ent.id}`);
                    
                    pnlEl.innerText = (pnl > 0 ? '+' : '') + pnl.toFixed(2) + " USDT";
                    pnlEl.className = `pnl-text ${pnl > 0 ? 'pnl-green' : (pnl < 0 ? 'pnl-red' : '')}`;
                    hpEl.style.width = progress + '%';

                    // 动态成长表现
                    if (progress > 30 && progress < 70) {
                        emojiEl.innerText = side === 'long' ? '🪴' : '🐠';
                    } else if (progress >= 70) {
                        emojiEl.innerText = side === 'long' ? '🌳' : '🦈';
                    }

                    // 3. 爆仓判定 (Equity <= 0)
                    if (equity <= 0) {
                        ent.status = 'rekt';
                        emojiEl.innerText = side === 'long' ? '🥀' : '☠️';
                        document.getElementById(`slot_${side}_${idx}`).classList.add('anim-rekt');
                        pnlEl.innerText = "💥 爆仓归零";
                        
                        // 飘字动画
                        showFloatingText(`slot_${side}_${idx}`, `-${ent.amount.toFixed(2)}`, '#e74c3c');
                        
                        setTimeout(() => clearSlot(side, idx), 2500);
                        return; // 跳过后续逻辑
                    }

                    // 4. 到期收获判定
                    if (elapsed >= ent.durationMs) {
                        ent.status = 'harvested';
                        
                        // 收获本金 + 利润
                        const finalPayout = ent.amount + pnl;
                        balance += finalPayout;
                        updateBalanceUI();

                        if (pnl >= 0) {
                            emojiEl.innerText = side === 'long' ? '🍎' : '💰';
                            showFloatingText(`slot_${side}_${idx}`, `+${finalPayout.toFixed(2)}`, '#f1c40f');
                        } else {
                            emojiEl.innerText = side === 'long' ? '🍂' : '🦴';
                            showFloatingText(`slot_${side}_${idx}`, `拿回 ${finalPayout.toFixed(2)}`, '#bdc3c7');
                        }

                        setTimeout(() => clearSlot(side, idx), 2000);
                    }
                });
            });

            requestAnimationFrame(gameLoop);
        }

        // 飘字特效函数
        function showFloatingText(parentId, text, color) {
            const parent = document.getElementById(parentId);
            const el = document.createElement('div');
            el.className = 'anim-harvest';
            el.style.color = color;
            el.innerText = text;
            // 随机偏移一点位置
            el.style.left = (Math.random() * 20 + 20) + '%';
            el.style.top = '30%';
            parent.appendChild(el);
        }

        // 启动主循环
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
