<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OKX 盘感大亨 V8.0 | 真实仓位模拟</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=ZCOOL+KuaiLe&display=swap');

        body { 
            background-color: #0b0e14; color: #ffffff; 
            font-family: 'Nunito', 'ZCOOL KuaiLe', sans-serif;
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
        }

        .game-header { background: linear-gradient(90deg, #161b24, #1e2430); border-bottom: 2px solid #2b3139; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 50; flex-shrink: 0; }
        .asset-box { background: rgba(0,0,0,0.4); border: 1px solid rgba(241, 196, 15, 0.3); border-radius: 12px; padding: 4px 16px; display: flex; flex-direction: column; align-items: flex-end; box-shadow: inset 0 0 10px rgba(241, 196, 15, 0.1); }
        
        .tv-container { height: 35vh; border-bottom: 4px solid #161b24; background: #0b0e14; flex-shrink: 0; }
        .game-board { flex: 1; display: flex; padding: 16px; gap: 16px; background: radial-gradient(circle at center, #161b24 0%, #0b0e14 100%); overflow-y: auto; position: relative; }
        
        .zone { flex: 1; background: rgba(20, 25, 35, 0.6); border: 1px solid #2b3139; border-radius: 16px; padding: 16px; display: flex; flex-direction: column; backdrop-filter: blur(10px); }
        .zone-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-shrink: 0; }
        
        .grid-sys { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; flex: 1; min-height: 200px; }
        
        /* 坑位与真实仓位 UI */
        .slot { background: #1e2430; border: 2px solid #2b3139; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: inset 0 4px 10px rgba(0,0,0,0.3), 0 4px 0 #12161f; min-height: 120px; }
        .slot.empty:hover { border-color: #4a5568; transform: translateY(-2px); box-shadow: inset 0 4px 10px rgba(0,0,0,0.3), 0 6px 0 #12161f; cursor: pointer; }
        .slot.locked { background: #12161f; border-color: #1a1f29; opacity: 0.8; cursor: not-allowed; }
        
        .emoji-art { font-size: 32px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); transition: transform 0.3s; z-index: 10; margin-bottom: 15px; margin-top: 10px;}
        
        .btn-early-close { position: absolute; bottom: 8px; background: #12161f; border: 1px solid #4a5568; color: #fff; font-size: 11px; font-weight: bold; padding: 4px 20px; border-radius: 12px; cursor: pointer; z-index: 30; transition: all 0.1s; }
        .btn-early-close:hover { transform: scale(1.05); filter: brightness(1.2); }
        .btn-early-close:active { transform: scale(0.95); }

        .aura-safe { box-shadow: inset 0 0 30px rgba(14, 203, 129, 0.15) !important; border-color: #0ecb81 !important; }
        .aura-danger { box-shadow: inset 0 0 30px rgba(246, 70, 93, 0.15) !important; border-color: #f6465d !important; animation: dangerShake 0.5s infinite; }

        .prog-bar-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: #000; border-radius: 0 0 10px 10px; overflow: hidden; }
        .prog-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #3498db, #9b59b6); transition: width 0.1s linear; }

        /* 标签 */
        .badge-inst { position: absolute; top: 6px; left: 6px; background: rgba(255,255,255,0.1); font-size: 9px; padding: 2px 6px; border-radius: 4px; font-mono; border: 1px solid rgba(255,255,255,0.2); }
        .badge-pnl { position: absolute; top: 6px; right: 6px; font-size: 12px; font-weight: bold; font-mono; }
        .tpsl-info { position: absolute; bottom: 32px; font-size: 9px; color: #707a8a; font-mono; text-align: center; width: 100%; line-height: 1.2; }

        /* 模态框通用 */
        .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 100; }
        .panel-box { background: #161b24; border: 2px solid #2b3139; border-radius: 20px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative; }
        
        .game-input { width: 100%; background: #0b0e14; border: 1px solid #4a5568; color: #f1c40f; font-size: 16px; border-radius: 8px; padding: 8px 12px; font-family: monospace; font-weight: bold; outline: none; transition: 0.2s;}
        .game-input:focus { border-color: #0ecb81; }

        .toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; pointer-events: none; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: rgba(22, 27, 36, 0.95); border: 2px solid #f1c40f; color: #fff; padding: 12px 24px; border-radius: 50px; font-weight: bold; font-size: 14px; box-shadow: 0 10px 30px rgba(241, 196, 15, 0.3); animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), fadeOut 0.5s ease-out 3s forwards; display: flex; align-items: center; gap: 8px;}
        
        @keyframes slideDown { from { transform: translateY(-40px) scale(0.8); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-20px); } }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-60px) scale(1.5); } }
        @keyframes dangerShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-2px); } 75% { transform: translateX(2px); } }
        @keyframes bounceIn { 0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .floating-text { position: absolute; font-size: 18px; font-weight: 900; z-index: 50; text-shadow: 0 4px 6px #000; animation: floatUp 1.5s ease-out forwards; pointer-events: none; font-family: 'Nunito'; white-space: nowrap; }
        .anim-pop { animation: bounceIn 0.4s ease-out; }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <header class="game-header">
        <div class="flex items-center gap-4">
            <div class="text-xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-[#0ecb81] to-[#3498db] font-['ZCOOL_KuaiLe']">
                盘感大亨 V8.0
            </div>
            <select id="instSelect" class="bg-[#1e2430] border border-[#2b3139] text-white px-3 py-1.5 rounded-lg font-bold outline-none cursor-pointer" onchange="changeSymbol()">
                <option value="BTC-USDT-SWAP">BTC/USDT</option>
                <option value="ETH-USDT-SWAP">ETH/USDT</option>
                <option value="SOL-USDT-SWAP">SOL/USDT</option>
                <option value="DOGE-USDT-SWAP">DOGE/USDT</option>
            </select>
        </div>

        <div class="flex items-center gap-6">
            <div class="text-sm font-mono flex items-center gap-2">
                <span class="text-gray-400" id="wsStatus">行情连线中...</span>
                <span id="realtimePrice" class="text-[26px] font-bold text-[#0ecb81] w-[140px] text-right tracking-tighter">--</span>
            </div>
            <div class="asset-box ml-2">
                <div class="text-xs text-gray-400 flex items-center gap-1">🏦 金库可用 (USDT)</div>
                <div class="text-[#f1c40f] font-mono font-bold text-[22px]" id="balanceDisplay">10,000.00</div>
            </div>
        </div>
    </header>

    <div class="tv-container" id="tv_chart_container"></div>

    <div class="game-board">
        <div class="zone relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-[#0ecb81] to-transparent opacity-50"></div>
            <div class="zone-header">
                <div class="flex items-center gap-2">
                    <span class="text-2xl">🌾</span>
                    <div>
                        <h2 class="font-bold text-lg text-[#0ecb81]">多头农场 (做多仓位)</h2>
                    </div>
                </div>
            </div>
            <div class="grid-sys" id="farmGrid"></div>
        </div>

        <div class="zone relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-[#f6465d] to-transparent opacity-50"></div>
            <div class="zone-header">
                <div class="flex items-center gap-2">
                    <span class="text-2xl">🐟</span>
                    <div>
                        <h2 class="font-bold text-lg text-[#f6465d]">空头水族箱 (做空仓位)</h2>
                    </div>
                </div>
            </div>
            <div class="grid-sys" id="pondGrid"></div>
        </div>
    </div>

    <div class="modal-bg" id="orderModal" onclick="if(event.target===this) closeModal('orderModal')">
        <div class="panel-box" style="width: 380px;">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-white flex items-center gap-2" id="orderTitle">
                    <span>🌱</span> 配置播种参数
                </h2>
                <button onclick="closeModal('orderModal')" class="text-gray-500 hover:text-white text-2xl leading-none">&times;</button>
            </div>
            
            <div class="space-y-4">
                <div class="text-xs text-center text-gray-400 bg-black/30 py-1 rounded">
                    当前建仓标的: <span id="orderInstLabel" class="text-white font-bold font-mono">BTC-USDT-SWAP</span><br>
                    当前市价: <span id="orderPriceLabel" class="text-[#f1c40f] font-mono">--</span>
                </div>

                <div class="flex gap-2">
                    <div class="flex-1">
                        <div class="text-xs text-gray-400 mb-1">投入本金 (USDT)</div>
                        <input type="number" id="orderAmount" class="game-input" value="100">
                    </div>
                    <div class="flex-1">
                        <div class="text-xs text-gray-400 mb-1">化肥强度 (杠杆)</div>
                        <select id="orderLev" class="game-input cursor-pointer">
                            <option value="1">1x (无风险)</option>
                            <option value="10" selected>10x (稳健)</option>
                            <option value="50">50x (激进)</option>
                            <option value="100">100x (赌徒)</option>
                        </select>
                    </div>
                </div>

                <div class="flex gap-2">
                    <div class="flex-1">
                        <div class="text-xs text-gray-400 mb-1">止盈价 (TP) 选填</div>
                        <input type="number" id="orderTP" class="game-input" placeholder="不填则无">
                    </div>
                    <div class="flex-1">
                        <div class="text-xs text-gray-400 mb-1">止损价 (SL) 选填</div>
                        <input type="number" id="orderSL" class="game-input" placeholder="不填则无">
                    </div>
                </div>

                <div>
                    <div class="text-xs text-gray-400 mb-1">成熟倒计时 (超时将以市价强制平仓)</div>
                    <select id="orderDuration" class="game-input cursor-pointer">
                        <option value="0">无限期 (靠TP/SL或手动平仓)</option>
                        <option value="60">1 分钟</option>
                        <option value="300">5 分钟</option>
                        <option value="3600">1 小时</option>
                    </select>
                </div>

                <button class="w-full mt-4 py-3 rounded-xl font-bold text-lg text-white shadow-lg transition-transform active:scale-95" id="btnSubmitOrder" onclick="submitOrder()">
                    确认建仓
                </button>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        let tvWidget;
        function loadTradingView(symbol) {
            const script = document.createElement('script');
            script.src = "https://s3.tradingview.com/tv.js";
            script.onload = () => {
                document.getElementById('tv_chart_container').innerHTML = '';
                tvWidget = new TradingView.widget({
                    "autosize": true, "symbol": "OKX:" + symbol.replace('-SWAP', '.P').replace('-', ''),
                    "interval": "1", "timezone": "Asia/Shanghai", "theme": "dark", "style": "1",
                    "locale": "zh_CN", "enable_publishing": false, "hide_top_toolbar": true,
                    "hide_legend": true, "save_image": false, "container_id": "tv_chart_container",
                    "backgroundColor": "#0b0e14", "gridColor": "#161b24"
                });
            };
            document.head.appendChild(script);
        }
    </script>

    <script>
        // --- 核心全局状态 (支持多币种) ---
        let state = {
            balance: 10000.00,
            activeInstId: "BTC-USDT-SWAP", // 当前正在查看的币种
            prices: {
                "BTC-USDT-SWAP": 0,
                "ETH-USDT-SWAP": 0,
                "SOL-USDT-SWAP": 0,
                "DOGE-USDT-SWAP": 0
            }
        };

        const TOTAL_SLOTS = 6;
        let grids = {
            long: Array.from({length: TOTAL_SLOTS}, (_, i) => ({ id: `l_${i}`, unlocked: i < 3, unlockPrice: (i*i*500)+100, item: null })),
            short: Array.from({length: TOTAL_SLOTS}, (_, i) => ({ id: `s_${i}`, unlocked: i < 3, unlockPrice: (i*i*500)+100, item: null }))
        };

        function showToast(icon, message, color = '#f1c40f') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast'; toast.style.borderColor = color;
            toast.innerHTML = `<span class="text-xl">${icon}</span> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { if(toast.parentElement) toast.parentElement.removeChild(toast); }, 3500);
        }

        function updateBalance() {
            document.getElementById('balanceDisplay').innerText = state.balance.toLocaleString(undefined, {minimumFractionDigits:2});
        }

        // --- WebSocket 多频道管理 ---
        let ws = null;
        function connectWS() {
            if(ws) ws.close();
            document.getElementById('wsStatus').innerText = '行情连接中...';
            ws = new WebSocket('wss://ws.okx.com:8443/ws/v5/public');
            
            ws.onopen = () => { 
                document.getElementById('wsStatus').innerText = '行情正常';
                document.getElementById('wsStatus').style.color = '#0ecb81';
                
                // 核心：一次性订阅所有可能被交易的币种
                const args = Object.keys(state.prices).map(id => ({ channel: "tickers", instId: id }));
                ws.send(JSON.stringify({ op: "subscribe", args: args })); 
            };
            
            ws.onmessage = (event) => {
                if(event.data === 'pong') return;
                const res = JSON.parse(event.data);
                if (res.data && res.data[0]) {
                    const data = res.data[0];
                    const id = data.instId;
                    const price = parseFloat(data.last);
                    
                    state.prices[id] = price;

                    // 更新顶部 UI (仅当该币种是当前选中币种时)
                    if (id === state.activeInstId) {
                        const pEl = document.getElementById('realtimePrice');
                        const oldP = parseFloat(pEl.innerText) || 0;
                        pEl.innerText = price.toString();
                        pEl.style.color = price >= oldP ? '#0ecb81' : '#f6465d';
                        
                        // 更新弹窗里的价格
                        const orderP = document.getElementById('orderPriceLabel');
                        if (orderP) orderP.innerText = price;
                    }
                }
            };
            ws.onclose = () => { setTimeout(connectWS, 3000); };
        }

        function changeSymbol() {
            state.activeInstId = document.getElementById('instSelect').value;
            document.getElementById('realtimePrice').innerText = '--';
            loadTradingView(state.activeInstId);
            // 这里不需要重连 WS，因为我们已经一次性订阅了所有币种
        }

        // --- 网格渲染系统 ---
        function renderGrids() {
            const farm = document.getElementById('farmGrid');
            const pond = document.getElementById('pondGrid');
            farm.innerHTML = ''; pond.innerHTML = '';

            grids.long.forEach((slot, idx) => farm.appendChild(createSlotDOM(slot, 'long', idx)));
            grids.short.forEach((slot, idx) => pond.appendChild(createSlotDOM(slot, 'short', idx)));
        }

        function createSlotDOM(slot, side, index) {
            const div = document.createElement('div');
            div.className = 'slot'; div.id = `dom_${slot.id}`;

            if (!slot.unlocked) {
                div.classList.add('locked');
                div.innerHTML = `<div class="text-3xl mb-1 opacity-50">🔒</div><div class="text-[#f1c40f] text-xs font-bold bg-black/60 px-2 py-1 rounded mt-2">扩建: ${slot.unlockPrice}U</div>`;
                div.onclick = () => handleUnlock(side, index);
                return div;
            }

            if (!slot.item) {
                div.classList.add('empty');
                div.innerHTML = `<div class="emoji-art opacity-10" style="margin-bottom:0">➕</div>`;
                div.onclick = () => openOrderModal(side, index);
            } else {
                const it = slot.item;
                const baseAsset = it.instId.split('-')[0]; // e.g. BTC
                
                div.innerHTML = `
                    <div class="badge-inst">${baseAsset} ${it.leverage}x</div>
                    <div class="badge-pnl" id="pnl_${slot.id}">--</div>
                    <div class="emoji-art anim-pop" id="emoji_${slot.id}">${side === 'long' ? '🌱' : '🥚'}</div>
                    <div class="tpsl-info">
                        ${it.tp ? 'TP:'+it.tp : ''} ${it.sl ? 'SL:'+it.sl : ''}
                    </div>
                    <button class="btn-early-close" id="btn_close_${slot.id}" onclick="executeClose('${side}', ${index}, 'manual', event)">市价平仓</button>
                    ${it.durationMs ? `<div class="prog-bar-container"><div class="prog-bar-fill" id="prog_${slot.id}"></div></div>` : ''}
                `;
            }
            return div;
        }

        function handleUnlock(side, index) {
            const slot = grids[side][index];
            if(state.balance >= slot.unlockPrice) {
                state.balance -= slot.unlockPrice; slot.unlocked = true;
                showToast("🔨", "成功开垦新区域！", "#0ecb81");
                updateBalance(); renderGrids();
            } else {
                showToast("❌", "金库余额不足以扩建！", "#f6465d");
            }
        }

        // --- 订单系统 (核心逻辑) ---
        let currentActionTarget = null;
        function openOrderModal(side, index) {
            const price = state.prices[state.activeInstId];
            if(price <= 0) return alert("正在拉取实时数据，请稍后...");
            
            currentActionTarget = { side, index };
            
            // UI 配置
            const isLong = side === 'long';
            document.getElementById('orderTitle').innerHTML = isLong ? '<span>🌱</span> 配置多头(看涨)参数' : '<span>🐟</span> 配置空头(看跌)参数';
            document.getElementById('orderInstLabel').innerText = state.activeInstId;
            document.getElementById('orderPriceLabel').innerText = price;
            
            const btn = document.getElementById('btnSubmitOrder');
            btn.className = `w-full mt-4 py-3 rounded-xl font-bold text-lg text-white shadow-lg transition-transform active:scale-95 ${isLong ? 'bg-[#0ecb81] hover:bg-[#0b9e65]' : 'bg-[#f6465d] hover:bg-[#c9384b]'}`;
            btn.innerText = isLong ? '支付本金并种下' : '支付本金并投卵';

            // 清空之前的 TP SL 记录
            document.getElementById('orderTP').value = '';
            document.getElementById('orderSL').value = '';

            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }

        function submitOrder() {
            const amount = parseFloat(document.getElementById('orderAmount').value);
            const lev = parseInt(document.getElementById('orderLev').value);
            const tp = parseFloat(document.getElementById('orderTP').value) || 0;
            const sl = parseFloat(document.getElementById('orderSL').value) || 0;
            const durSec = parseInt(document.getElementById('orderDuration').value);
            
            const instId = state.activeInstId;
            const currentPrice = state.prices[instId];
            const { side, index } = currentActionTarget;

            // 基础校验
            if(isNaN(amount) || amount <= 0) return alert("请输入有效本金");
            if(state.balance < amount) return alert("金库余额不足！");
            
            // TP/SL 逻辑校验
            if (side === 'long') {
                if (tp > 0 && tp <= currentPrice) return alert("做多止盈价必须大于当前市价！");
                if (sl > 0 && sl >= currentPrice) return alert("做多止损价必须小于当前市价！");
            } else {
                if (tp > 0 && tp >= currentPrice) return alert("做空止盈价必须小于当前市价！");
                if (sl > 0 && sl <= currentPrice) return alert("做空止损价必须大于当前市价！");
            }

            // 扣费创建
            state.balance -= amount;
            updateBalance();

            grids[side][index].item = {
                instId: instId,
                amount: amount,
                leverage: lev,
                entryPrice: currentPrice,
                tp: tp,
                sl: sl,
                startTime: Date.now(),
                durationMs: durSec * 1000, // 0 means infinity
                resolved: false
            };
            
            showToast(side === 'long' ? "🌱" : "🐟", `成功开仓 ${instId} ${lev}x`, side === 'long' ? "#0ecb81" : "#f6465d");
            closeModal('orderModal'); renderGrids();
        }

        // --- 游戏主循环 (全自动结算引擎) ---
        function gameLoop() {
            const now = Date.now();
            ['long', 'short'].forEach(side => {
                grids[side].forEach((slot, index) => {
                    const it = slot.item;
                    if(!it || it.resolved) return;

                    const currentPrice = state.prices[it.instId];
                    if(!currentPrice) return; // 容错

                    const dom = document.getElementById(`dom_${slot.id}`);
                    const pnlEl = document.getElementById(`pnl_${slot.id}`);
                    const progEl = document.getElementById(`prog_${slot.id}`);
                    const emojiEl = document.getElementById(`emoji_${slot.id}`);

                    // 1. 核心数学计算：真实合约盈亏 (ROE)
                    // ROE = (现价 - 开仓价) / 开仓价 * 杠杆 * 方向
                    const priceDiff = currentPrice - it.entryPrice;
                    const roe = (priceDiff / it.entryPrice) * it.leverage * (side === 'long' ? 1 : -1);
                    const pnl = it.amount * roe;

                    // 2. 渲染 UI
                    if(pnlEl) {
                        pnlEl.innerText = (pnl > 0 ? '+' : '') + pnl.toFixed(2);
                        pnlEl.style.color = pnl > 0 ? '#0ecb81' : (pnl < 0 ? '#f6465d' : '#fff');
                    }

                    if(dom) {
                        if(pnl > 0) { dom.classList.remove('aura-danger'); dom.classList.add('aura-safe'); } 
                        else if (pnl < 0) { dom.classList.remove('aura-safe'); dom.classList.add('aura-danger'); }
                    }

                    // 动态成长表现 (仅针对有时间的作物)
                    let progress = 0;
                    if (it.durationMs > 0) {
                        const elapsed = now - it.startTime;
                        progress = Math.min(elapsed / it.durationMs, 1);
                        if(progEl) progEl.style.width = (progress * 100) + '%';
                        
                        if(emojiEl) {
                            if (progress > 0.4 && progress < 0.8) emojiEl.innerText = side === 'long' ? '🌿' : '🐡';
                            else if (progress >= 0.8) emojiEl.innerText = side === 'long' ? '🌳' : '🦈';
                        }
                    }

                    // 3. 自动触发器判定 (TP / SL / 强平 / 时间)
                    let triggerType = null;
                    
                    if (roe <= -1) triggerType = 'liq'; // 强平 (亏损100%)
                    else if (side === 'long') {
                        if (it.tp > 0 && currentPrice >= it.tp) triggerType = 'tp';
                        if (it.sl > 0 && currentPrice <= it.sl) triggerType = 'sl';
                    } else {
                        if (it.tp > 0 && currentPrice <= it.tp) triggerType = 'tp';
                        if (it.sl > 0 && currentPrice >= it.sl) triggerType = 'sl';
                    }

                    if (!triggerType && it.durationMs > 0 && progress >= 1) triggerType = 'time';

                    if (triggerType) {
                        executeClose(side, index, triggerType);
                    }
                });
            });
            requestAnimationFrame(gameLoop);
        }

        // 平仓执行函数 (统一出口)
        function executeClose(side, index, reason, event = null) {
            if(event) event.stopPropagation();
            
            const slot = grids[side][index];
            const it = slot.item;
            if(!it || it.resolved) return;

            it.resolved = true;
            const currentPrice = state.prices[it.instId];
            const roe = ((currentPrice - it.entryPrice) / it.entryPrice) * it.leverage * (side === 'long' ? 1 : -1);
            let finalPnl = it.amount * roe;

            // 强平判定
            if (reason === 'liq' || roe <= -1) finalPnl = -it.amount; 

            const payout = it.amount + finalPnl;
            state.balance += Math.max(0, payout);
            updateBalance();

            // 表现层
            const dom = document.getElementById(`dom_${slot.id}`);
            const emojiEl = document.getElementById(`emoji_${slot.id}`);
            if(dom) {
                dom.classList.remove('aura-danger', 'aura-safe');
                document.getElementById(`btn_close_${slot.id}`).style.display = 'none';

                let txt = ''; let color = '';
                if (reason === 'tp') { txt = `止盈触达 +${finalPnl.toFixed(1)}`; color = '#0ecb81'; emojiEl.innerText = side==='long'?'🍎':'💰'; emojiEl.style.transform='scale(1.3)'; }
                else if (reason === 'sl') { txt = `止损断臂 ${finalPnl.toFixed(1)}`; color = '#f6465d'; emojiEl.innerText = '✂️'; emojiEl.style.filter='grayscale(1)'; }
                else if (reason === 'liq') { txt = `爆仓归零`; color = '#f6465d'; emojiEl.innerText = '☠️'; dom.classList.add('aura-danger'); }
                else if (reason === 'manual') { txt = `市价平仓 ${finalPnl>0?'+':''}${finalPnl.toFixed(1)}`; color = finalPnl>=0?'#f1c40f':'#bdc3c7'; }
                else if (reason === 'time') { txt = `期满收割 ${finalPnl>0?'+':''}${finalPnl.toFixed(1)}`; color = finalPnl>=0?'#0ecb81':'#f6465d'; }

                const ft = document.createElement('div');
                ft.className = 'floating-text';
                ft.style.color = color;
                ft.innerText = txt;
                dom.appendChild(ft);
            }

            setTimeout(() => { slot.item = null; renderGrids(); }, 2500);
        }

        // 初始化
        updateBalance();
        renderGrids(); 
        loadTradingView(state.activeInstId); 
        connectWS();
        requestAnimationFrame(gameLoop);
        setInterval(() => { if (ws && ws.readyState === WebSocket.OPEN) ws.send('ping'); }, 20000);
    </script>
</body>
</html>
