<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKX Crypto Farm 🚜 | 行情养成游戏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        body { 
            background-color: #2c3e50; 
            color: #ecf0f1; 
            font-family: 'ZCOOL KuaiLe', cursive, sans-serif; /* 使用趣味字体 */
            margin: 0; overflow: hidden; user-select: none;
        }

        /* 游戏场景划分 */
        .game-container { display: flex; height: calc(100vh - 140px); }
        
        .farm-zone { flex: 1; background: linear-gradient(180deg, #87CEEB 0%, #27ae60 50%, #2ecc71 100%); position: relative; border-right: 4px dashed rgba(255,255,255,0.2); overflow: hidden; }
        .pond-zone { flex: 1; background: linear-gradient(180deg, #87CEEB 0%, #2980b9 50%, #3498db 100%); position: relative; overflow: hidden; }

        /* 场景背景装饰 */
        .cloud { position: absolute; font-size: 40px; opacity: 0.8; animation: floatCloud 20s linear infinite; }
        .wave { position: absolute; font-size: 30px; opacity: 0.3; animation: waveMove 4s ease-in-out infinite alternate; }

        @keyframes floatCloud { 0% { transform: translateX(-100px); } 100% { transform: translateX(50vw); } }
        @keyframes waveMove { 0% { transform: translateX(-10px) translateY(0); } 100% { transform: translateX(10px) translateY(10px); } }

        /* 实体 (种子/鱼) 样式 */
        .entity-card {
            position: absolute;
            width: 80px; height: 100px;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            transition: all 0.3s;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }
        .entity-emoji { font-size: 48px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); transition: transform 0.2s; }
        
        /* 状态浮窗 (价格与进度) */
        .entity-status {
            background: rgba(0,0,0,0.6); border-radius: 8px; padding: 4px 6px; text-align: center;
            border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(4px);
            margin-bottom: 4px; width: 100px;
        }
        .progress-bar-bg { width: 100%; height: 6px; background: #555; border-radius: 3px; overflow: hidden; margin-top: 4px; }
        .progress-bar-fill { height: 100%; background: #f1c40f; width: 0%; transition: width 0.1s linear; }

        /* 动画效果 */
        @keyframes popIn { 0% { transform: scale(0) translateY(50px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
        @keyframes successBounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3) translateY(-20px); } }
        @keyframes failShake { 0%, 100% { transform: translateX(0); filter: grayscale(1); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px) scale(1.5); } }

        .anim-success { animation: successBounce 0.5s ease-out; }
        .anim-fail { animation: failShake 0.5s ease-out forwards; opacity: 0.7; }
        .reward-text { position: absolute; color: #f1c40f; font-weight: bold; font-size: 24px; text-shadow: 0 2px 4px #000; animation: floatUp 1.5s ease-out forwards; pointer-events: none; z-index: 20; }

        /* 底部控制台 */
        .dashboard {
            height: 140px; background: #1a252f; border-top: 4px solid #34495e;
            display: flex; align-items: center; justify-content: space-between; padding: 0 40px;
        }
        .btn-game {
            border: none; outline: none; border-radius: 12px; font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 20px; padding: 12px 24px; cursor: pointer; transition: all 0.2s; box-shadow: 0 6px 0 rgba(0,0,0,0.4);
            display: flex; align-items: center; gap: 8px; color: white;
        }
        .btn-game:active { transform: translateY(6px); box-shadow: 0 0 0 rgba(0,0,0,0.4); }
        .btn-long { background: #27ae60; } .btn-long:hover { background: #2ecc71; }
        .btn-short { background: #2980b9; } .btn-short:hover { background: #3498db; }

        .okx-input { background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); color: white; border-radius: 8px; padding: 8px 12px; font-size: 18px; outline: none; font-family: monospace; text-align: center;}
    </style>
</head>
<body>

    <div class="absolute top-0 left-0 w-full p-4 flex justify-between items-start z-50 pointer-events-none">
        <div class="bg-black/50 backdrop-blur rounded-xl p-3 border border-white/20">
            <div class="text-sm text-gray-300 mb-1">💰 我的金库</div>
            <div class="text-3xl text-[#f1c40f] tracking-wider" id="balanceDisplay">1000.00 USDT</div>
        </div>
        <div class="bg-black/50 backdrop-blur rounded-xl p-3 border border-white/20 text-center">
            <div class="text-sm text-gray-300 mb-1 flex items-center gap-2 justify-center">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                BTC 实时行情 (OKX)
            </div>
            <div class="text-3xl text-white font-mono" id="tickerPrice">Loading...</div>
        </div>
    </div>

    <div class="game-container">
        <div class="farm-zone" id="farmZone">
            <div class="absolute top-4 left-4 text-white/50 text-2xl font-bold">↑ 农场 (猜涨)</div>
            <div class="cloud" style="top: 10%; animation-delay: 0s;">☁️</div>
            <div class="cloud" style="top: 25%; animation-delay: -10s; font-size: 60px;">☁️</div>
        </div>
        
        <div class="pond-zone" id="pondZone">
            <div class="absolute top-4 right-4 text-white/50 text-2xl font-bold">↓ 池塘 (猜跌)</div>
            <div class="wave" style="top: 40%; left: 20%;">〰️</div>
            <div class="wave" style="top: 60%; left: 60%; animation-delay: -2s;">〰️</div>
            <div class="wave" style="top: 80%; left: 30%; animation-delay: -1s;">〰️</div>
        </div>
    </div>

    <div class="dashboard z-50 relative">
        <div class="flex flex-col items-center gap-2">
            <button class="btn-game btn-long" onclick="plantSeed()">
                <span>🌱 种下种子 (看涨)</span>
            </button>
            <div class="text-xs text-green-400 font-mono">若到期上涨，树结苹果🍎赢 1.8x</div>
        </div>

        <div class="flex gap-4 bg-black/30 p-4 rounded-2xl border border-white/10 shadow-inner">
            <div class="flex flex-col">
                <label class="text-xs text-gray-400 mb-1">投入金额 (USDT)</label>
                <input type="number" id="investAmount" class="okx-input w-[120px]" value="100">
            </div>
            <div class="flex flex-col">
                <label class="text-xs text-gray-400 mb-1">生长时间 (预测周期)</label>
                <select id="timeDuration" class="okx-input w-[120px] cursor-pointer">
                    <option value="10">10 秒 (速测)</option>
                    <option value="30">30 秒</option>
                    <option value="60">1 分钟</option>
                    <option value="300">5 分钟</option>
                </select>
            </div>
        </div>

        <div class="flex flex-col items-center gap-2">
            <button class="btn-game btn-short" onclick="hatchEgg()">
                <span>🥚 孵化鱼卵 (看跌)</span>
            </button>
            <div class="text-xs text-blue-400 font-mono">若到期下跌，鱼吐金币💰赢 1.8x</div>
        </div>
    </div>

    <script>
        // --- 核心逻辑 ---
        let balance = 1000.00;
        let currentPrice = 0;
        let activeEntities = []; // 存放场上的植物/鱼
        
        const PAYOUT_MULTIPLIER = 1.8; // 赢了拿回 1.8 倍

        // 1. 接入 OKX 行情
        const ws = new WebSocket('wss://ws.okx.com:8443/ws/v5/public');
        ws.onopen = () => { ws.send(JSON.stringify({ op: "subscribe", args: [{ channel: "tickers", instId: "BTC-USDT-SWAP" }] })); };
        ws.onmessage = (event) => {
            if(event.data === 'pong') return;
            const res = JSON.parse(event.data);
            if (res.data && res.data[0]) {
                const newPrice = parseFloat(res.data[0].last);
                const priceEl = document.getElementById('tickerPrice');
                priceEl.innerText = newPrice.toFixed(2);
                priceEl.style.color = newPrice >= currentPrice ? '#2ecc71' : '#e74c3c';
                currentPrice = newPrice;
            }
        };
        setInterval(() => { if (ws.readyState === WebSocket.OPEN) ws.send('ping'); }, 20000);

        function updateBalanceUI() {
            document.getElementById('balanceDisplay').innerText = balance.toFixed(2) + " USDT";
        }

        // 2. 玩家动作：种树 (买涨)
        function plantSeed() {
            createEntity('long');
        }

        // 2. 玩家动作：养鱼 (买跌)
        function hatchEgg() {
            createEntity('short');
        }

        function createEntity(type) {
            if(currentPrice <= 0) return alert("等待行情数据加载...");
            
            const amount = parseFloat(document.getElementById('investAmount').value);
            if(isNaN(amount) || amount <= 0 || amount > balance) return alert("金额输入有误或余额不足！");
            
            const durationSec = parseInt(document.getElementById('timeDuration').value);
            
            // 扣除余额
            balance -= amount;
            updateBalanceUI();

            const entityId = 'ent_' + Date.now();
            const zoneId = type === 'long' ? 'farmZone' : 'pondZone';
            const zone = document.getElementById(zoneId);
            
            // 随机生成坐标 (避免重叠可以加复杂逻辑，这里用简单随机)
            const randomX = Math.random() * (zone.clientWidth - 100) + 10;
            const randomY = Math.random() * (zone.clientHeight - 200) + 80;

            // 创建 DOM
            const el = document.createElement('div');
            el.className = 'entity-card';
            el.id = entityId;
            el.style.left = randomX + 'px';
            el.style.top = randomY + 'px';
            
            // UI 内部结构
            el.innerHTML = `
                <div class="entity-status">
                    <div class="text-[10px] text-gray-300 font-mono">入场价</div>
                    <div class="text-[11px] font-bold text-white">${currentPrice.toFixed(1)}</div>
                    <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog_${entityId}"></div></div>
                </div>
                <div class="entity-emoji" id="emoji_${entityId}">${type === 'long' ? '🌱' : '🥚'}</div>
            `;
            zone.appendChild(el);

            // 注册到游戏循环
            activeEntities.push({
                id: entityId,
                type: type, // 'long' 或 'short'
                amount: amount,
                entryPrice: currentPrice,
                startTime: Date.now(),
                durationMs: durationSec * 1000,
                domEl: el,
                emojiEl: document.getElementById(`emoji_${entityId}`),
                progEl: document.getElementById(`prog_${entityId}`),
                resolved: false
            });
        }

        // 3. 游戏主循环 (每帧更新画面与判定)
        function gameLoop() {
            const now = Date.now();
            
            activeEntities.forEach(ent => {
                if (ent.resolved) return;

                const elapsed = now - ent.startTime;
                const progress = Math.min((elapsed / ent.durationMs) * 100, 100);
                
                // 更新进度条
                ent.progEl.style.width = progress + '%';

                // 动态变换表情 (成长过程)
                if (progress > 30 && progress < 70) {
                    ent.emojiEl.innerText = ent.type === 'long' ? '🌿' : '🐡';
                } else if (progress >= 70 && progress < 100) {
                    ent.emojiEl.innerText = ent.type === 'long' ? '🌳' : '🦈';
                }

                // 时间到，触发结算
                if (elapsed >= ent.durationMs) {
                    ent.resolved = true;
                    resolveEntity(ent);
                }
            });

            // 清理已完成并删除的实体
            activeEntities = activeEntities.filter(e => e.domEl.parentElement);

            requestAnimationFrame(gameLoop);
        }

        // 4. 结算判定
        function resolveEntity(ent) {
            let isWin = false;
            
            // 判断输赢
            if (ent.type === 'long') {
                isWin = currentPrice > ent.entryPrice;
            } else {
                isWin = currentPrice < ent.entryPrice;
            }

            if (isWin) {
                // 赢了：动画变丰收，增加余额
                ent.emojiEl.innerText = ent.type === 'long' ? '🍎' : '💰';
                ent.emojiEl.classList.add('anim-success');
                
                const winAmount = ent.amount * PAYOUT_MULTIPLIER;
                balance += winAmount;
                updateBalanceUI();

                // 飘字动画
                const rewardText = document.createElement('div');
                rewardText.className = 'reward-text';
                rewardText.innerText = '+' + winAmount.toFixed(2);
                ent.domEl.appendChild(rewardText);

            } else {
                // 输了：枯萎/死亡
                ent.emojiEl.innerText = ent.type === 'long' ? '🥀' : '☠️';
                ent.emojiEl.classList.add('anim-fail');
            }

            // 3秒后销毁实体
            setTimeout(() => {
                ent.domEl.style.opacity = '0';
                ent.domEl.style.transform = 'scale(0)';
                setTimeout(() => {
                    if(ent.domEl.parentElement) ent.domEl.parentElement.removeChild(ent.domEl);
                }, 300);
            }, 3000);
        }

        // 启动循环
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
